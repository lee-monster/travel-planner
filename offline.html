<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelKo - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f9fafb; color: #374151; text-align: center; padding: 2rem; }
    .offline-wrap { max-width: 360px; }
    .offline-icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #111827; }
    p { font-size: 0.95rem; color: #6b7280; margin-bottom: 1.5rem; line-height: 1.5; }
    button { padding: 12px 28px; border: none; border-radius: 8px; background: #2563EB; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #1D4ED8; }
  </style>
</head>
<body>
  <div class="offline-wrap">
    <div class="offline-icon">&#127758;</div>
    <h1>You're Offline</h1>
    <p>Please check your internet connection and try again to explore Korea's best travel spots.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
